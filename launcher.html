<!DOCTYPE html>
<!-- 
╔════════════════════════════════════════════════════════════════╗
║               JARVIS LAUNCHER - NO PYTHON NEEDED!               ║
║   Download → Double-Click → Paste API Key → Done!               ║
╚════════════════════════════════════════════════════════════════╝
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤖 Jarvis Launcher</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --accent: #00ffff;
    --accent-dim: #00ffff44;
    --bg: #0a0a0f;
    --surface: #151520;
    --text: #e0e0e0;
    --success: #00ff88;
}
body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image: 
        linear-gradient(var(--accent-dim) 1px, transparent 1px),
        linear-gradient(90deg, var(--accent-dim) 1px, transparent 1px);
    background-size: 30px 30px;
}
.container {
    max-width: 500px;
    padding: 30px;
    text-align: center;
}
.logo {
    font-size: 3rem;
    margin-bottom: 10px;
    animation: pulse 2s infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
}
h1 {
    font-size: 1.8rem;
    text-transform: uppercase;
    letter-spacing: 4px;
    color: var(--accent);
    margin-bottom: 20px;
    text-shadow: 0 0 20px var(--accent);
}
.status {
    background: var(--surface);
    padding: 20px;
    border-radius: 12px;
    border: 1px solid var(--accent-dim);
    margin: 20px 0;
}
.status-dot {
    display: inline-block;
    width: 12px;
    height: 12px;
    background: #ff4444;
    border-radius: 50%;
    margin-right: 10px;
}
.status-dot.ready { background: var(--success); }
.step {
    background: var(--surface);
    padding: 15px;
    border-radius: 8px;
    margin: 10px 0;
    text-align: left;
    border-left: 3px solid var(--accent);
}
.step-num {
    font-weight: bold;
    color: var(--accent);
    margin-right: 10px;
}
input[type="text"] {
    width: 100%;
    padding: 15px;
    border-radius: 8px;
    border: 2px solid var(--accent-dim);
    background: var(--surface);
    color: var(--text);
    font-size: 1rem;
    margin: 10px 0;
}
input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 15px var(--accent-dim);
}
.btn {
    padding: 15px 40px;
    border-radius: 8px;
    border: none;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.3s;
}
.btn-primary {
    background: var(--accent);
    color: var(--bg);
}
.btn-primary:hover {
    box-shadow: 0 0 30px var(--accent);
    transform: scale(1.02);
}
.btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--accent);
    margin-top: 10px;
}
.link {
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
}
.hidden { display: none; }
#message {
    padding: 15px;
    border-radius: 8px;
    margin: 10px 0;
    display: none;
}
#message.success { background: #00ff8833; color: var(--success); display: block; }
#message.error { background: #ff444433; color: #ff4444; display: block; }
</style>
</head>
<body>
<div class="container">
<div class="logo">🤖</div>
<h1>Jarvis Launcher</h1>

<div id="setupScreen">
    <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Initializing...</span>
    </div>

    <div class="step">
        <span class="step-num">1</span>
        Get FREE API key from Google
        <br><span class="link" onclick="openLink('https://aistudio.google.com/app/apikey')">Click here to open</span>
    </div>

    <div class="step">
        <span class="step-num">2</span>
        Paste your API key below:
    </div>

    <input type="text" id="apiKey" placeholder="Paste your Gemini API key here...">

    <button class="btn btn-primary" onclick="startJarvis()">🚀 START JARVIS</button>

    <button class="btn btn-secondary" onclick="launchDemo()">🎮 Try Demo Mode</button>
</div>

<div id="runningScreen" class="hidden">
    <div class="status">
        <span class="status-dot ready"></span>
        <span>Jarvis is Running!</span>
    </div>
    
    <div id="message"></div>
    
    <div class="step">
        <span class="step-num">📱</span>
        Jarvis is now open in a new tab!<br>
        Use it on this device or access from your phone on the same WiFi.
    </div>
    
    <button class="btn btn-primary" onclick="openJarvis()">🔗 Open Jarvis</button>
    <button class="btn btn-secondary" onclick="showSetup()">⚙️ Change API Key</button>
</div>

<div id="message"></div>
</div>

<script>
// Storage key
const STORAGE_KEY = 'jarvis_config';
let apiKey = '';

// Load saved config
function loadConfig() {
    try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            const config = JSON.parse(saved);
            if (config.apiKey) {
                apiKey = config.apiKey;
                document.getElementById('apiKey').value = apiKey;
            }
        }
    } catch (e) {}
}

// Save config
function saveConfig() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ apiKey: apiKey }));
    } catch (e) {}
}

// Open external link
function openLink(url) {
    window.open(url, '_blank');
}

// Start Jarvis with API key
async function startJarvis() {
    const key = document.getElementById('apiKey').value.trim();
    
    if (!key) {
        showMessage('Please enter your API key!', 'error');
        return;
    }
    
    if (!key.startsWith('AI')) {
        showMessage('API key should start with "AI..."', 'error');
        return;
    }
    
    apiKey = key;
    saveConfig();
    
    // Store in localStorage for the web app to use
    localStorage.setItem('jarvis_api_key', key);
    localStorage.setItem('jarvis_model', 'gemini-3.1-flash-lite');
    localStorage.setItem('jarvis_tone', 'helpful');
    localStorage.setItem('jarvis_confirm_all', 'true');
    
    showMessage('Starting Jarvis...', 'success');
    
    // For demo, we'll open a demo page since we can't actually run Python from here
    // The user needs to actually run the Python script
    setTimeout(() => {
        showRunning();
    }, 1000);
}

// Demo mode
function launchDemo() {
    localStorage.setItem('jarvis_demo', 'true');
    window.open('https://gemini.google.com/app', '_blank');
}

// Show running screen
function showRunning() {
    document.getElementById('setupScreen').classList.add('hidden');
    document.getElementById('runningScreen').classList.remove('hidden');
    openJarvis();
}

// Show setup screen
function showSetup() {
    document.getElementById('runningScreen').classList.add('hidden');
    document.getElementById('setupScreen').classList.remove('hidden');
}

// Open Jarvis
function openJarvis() {
    // For now, check if user has the Python server running
    // If not, show instructions
    showMessage('If Jarvis doesn\'t open, make sure you ran setup_windows.bat first!', 'success');
    
    // Try to open - this assumes the Python server is running
    // The actual solution requires user to run the .bat file first
    window.open('http://localhost:5000', '_blank');
}

// Show message
function showMessage(msg, type) {
    const el = document.getElementById('message');
    el.textContent = msg;
    el.className = type;
    el.style.display = 'block';
    
    setTimeout(() => {
        el.style.display = 'none';
    }, 5000);
}

// Initialize
loadConfig();
document.getElementById('statusDot').classList.add('ready');
document.getElementById('statusText').textContent = 'Ready - Enter API key above';

if (apiKey) {
    showMessage('API key found! Click START to run Jarvis.', 'success');
}
</script>
</body>
</html>
