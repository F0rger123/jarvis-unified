name: Build Jarvis Portable EXE
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install flask flask-cors requests google-generativeai pyttsx3 pyinstaller
      
      - name: Build EXE
        run: |
          pyinstaller Jarvis_Portable.spec --clean
      
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis_Portable
          path: dist/Jarvis_Setup.exe
      
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/Jarvis_Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}